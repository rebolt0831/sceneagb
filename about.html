<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>About sceneagb</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
position:relative;
height:1050px;
display:flex;
justify-content:center;
padding:20px;
}

header::before{
content:"";
position:absolute;
inset:0;
background:url("images/banner.gif") center/cover no-repeat;
z-index:-1;
}

.logo{
position:absolute;
left:30px;
top:18px;
font-size:26px;
font-weight:600;
color:black;
}

nav{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
}

nav a{
margin:0 18px;
text-decoration:none;
color:black;
font-weight:600;
}

.container{
max-width:700px;
margin:auto;
padding:60px 20px;
text-align:center;
}

/* MOBILE */

@media (max-width:768px){

header{
height:140px;
}

nav{
right:20px;
left:auto;
transform:none;
}

.logo{
left:20px;
top:18px;
font-size:18px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">sceneagb</div>

<nav>
<a href="index.html">Home</a>
<a href="socials.html">Socials</a>
<a href="about.html">About</a>
</nav>

</header>

<div class="container">

<h1>About</h1>

<p>
sceneagb is a website where editors can download scenepacks
from movies, anime, TV shows and games.
</p>

<p>
All scenepacks are free to use for editing.
</p>

</div>

</body>
</html>
